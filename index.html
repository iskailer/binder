<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111315" />
    <meta name="description" content="Roleta Brusca: RPG social nonsense brasileiro offline-first." />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/icons/icon.svg" />
    <link rel="stylesheet" href="./src/styles.css" />
    <title>Roleta Brusca</title>
    <!-- Runtime config (keys carregadas de arquivo local, nao commitado) -->
    <script src="./firebase-config.js"></script>
    <!-- Dependencias externas -->
    <script defer src="https://cdn.jsdelivr.net/npm/pouchdb@9.0.0/dist/pouchdb.min.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <!-- App -->
    <script type="module" src="./src/app.js"></script>
  </head>
  <body>
    <noscript>A Roleta Brusca precisa de JavaScript para salvar o caos localmente.</noscript>
    <div id="app"></div>
    <div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="true"></div>
  </body>
</html>
